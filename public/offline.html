<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <style>

    .container { text-align: center; max-width: 400px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; background: rgba(220,38,38,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 32px; height: 32px; stroke: #dc2626; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #a1a1aa; font-size: 0.875rem; margin-bottom: 1.5rem; }
    button { background: #dc2626; color: #fff; border: none; padding: 0.625rem 1.5rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    </div>

    <p>Internet baglantiniz yok. Lutfen baglantinizi kontrol edip tekrar deneyin.</p>

  </div>
</body>
</html>
