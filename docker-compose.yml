version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: iransavas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iransavas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d iransavas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
